let MODE='portfolio', FILTER='all', REPOS=[], REPONOTE="loading…";
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const vis=tags=>FILTER==='all'||tags.includes(FILTER)||tags.includes('core');
const summaryFor=()=>(RESUME.summaries&&RESUME.summaries[FILTER])||RESUME.summary;
const hlSummary=s=>s
  .replace('Self-taught engineer since age 7','<span class="hl">Self-taught engineer since age 7</span>')
  .replace('Self-taught since age 7','<span class="hl">Self-taught since age 7</span>')
  .replace('privacy and self-sovereignty','<span class="hl">privacy and self-sovereignty</span>')
  .replace('140K+ executions','<span class="hl">140K+ executions</span>');
const featuredRepos=()=>new Set(RESUME.projects.filter(p=>p.repo).map(p=>p.repo));

// remaining public repos not already featured
function extraRepos(){
  const feat=featuredRepos(); const seen=new Set();
  return (REPOS||[]).filter(r=>!r.fork && !feat.has(r.name.toLowerCase()) && !seen.has(r.name)&&seen.add(r.name))
    .sort((a,b)=>(b.stargazers_count-a.stargazers_count)||(new Date(b.updated_at||0)-new Date(a.updated_at||0)));
}

    <a href="${R.urls.github}"><span class="k">git</span> ${esc(R.links.github)}</a>

    <a href="${R.urls.upwork}"><span class="k">up</span> ${esc(R.links.upwork)}</a>`;
  const proj=R.projects.filter(p=>vis(p.tags)).map(p=>{
    const stats=(p.stats||[]).map(s=>s.badge?`<span class="s badge">✓ ${esc(s.badge)}</span>`:`<span class="s"><b>${esc(s.val)}</b> ${esc(s.label)}</span>`).join("");
    const chips=(p.chips||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const link=p.link?`<a href="${esc(p.link)}">${p.repo?'repo':'link'} ↗</a>`:`<span style="color:var(--muted);font-size:11px">private</span>`;
    return `<div class="card"><h3>${esc(p.title)} ${link}</h3><p>${esc(p.desc)}</p><div class="stats">${stats}</div><div class="row-tags">${chips}</div></div>`;
  }).join("");
  const extras=(FILTER==='all')?extraRepos():[];
  const moreLine=extras.length?`<div class="more"><b>${esc(REPONOTE)}</b> · more on github: ${extras.map(r=>`<a href="${esc(r.html_url)}">${esc(r.name)}</a>`).join(", ")}</div>`:"";
  const exp=R.experience.map(j=>{const bl=j.bullets.filter(b=>vis(b.tags)); if(!bl.length)return"";
    return `<div class="job"><div class="job-top"><div class="job-title">${esc(j.role)} <span class="job-co">@ ${esc(j.company)}</span></div><div class="job-date">${esc(j.dates)}</div></div>

  const sec=(cmd,inner,sub)=>inner?`<section><h2 class="sechead"><span><span class="u">noah@wardell</span><span class="pp">:~$</span> <span class="c">${cmd}</span></span></h2>${sub||''}${inner}</section>`:"";
  document.getElementById('stage').innerHTML=`<div class="p">
    <div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="tt">noah@wardell: ~</span></div>
    <header class="hero">
      <div class="cmdline"><span class="u">noah@wardell</span><span class="pp">:~$</span> <span class="c">whoami</span><span class="cursor"></span></div>
      <h1 class="name">${esc(R.name)}</h1><div class="role">${esc(R.tagline)}</div>
      <p class="blurb">${hlSummary(summaryFor())}</p>
      <div class="meta">${meta}</div></header>
    ${sec('cat projects.md',`<div class="grid">${proj}</div>${moreLine}`,'<div class="secsub">Consolidated work — public repos, private builds, and marketplace tooling on <a href="https://cortexone.rival.io/organization/umbra-industries-dao">Rival → Umbra Industries</a>.</div>')}
    ${sec('cat experience.log',exp+moreRoles)}
    ${sec('cat skills.conf',skills)}
    <section><h2 class="sechead"><span><span class="u">noah@wardell</span><span class="pp">:~$</span> <span class="c">cat education.txt certs.txt</span></span></h2>

}

function atsHTML(){
  const R=RESUME;
  const tel=(R.phoneParts||[]).join('-');

    `<a href="${R.urls.github}">${esc(R.links.github)}</a>`,`<a href="${R.urls.linkedin}">${esc(R.links.linkedin)}</a>`,
    `<a href="${R.urls.upwork}">${esc(R.links.upwork)}</a>`].join(" &nbsp;|&nbsp; ")
    +`<span class="phone-print"> &nbsp;|&nbsp; ${esc(tel)}</span>`;
  const exp=R.experience.map(j=>{const bl=j.bullets.filter(b=>vis(b.tags)); if(!bl.length)return"";
    return `<div class="aexp"><div class="aexp-top"><div class="aexp-role">${esc(j.role)} — <span class="aexp-co">${esc(j.company)}</span></div><div class="aexp-date">${esc(j.dates)}</div></div>
      <div class="aexp-loc">${esc(j.loc)}</div><ul>${bl.map(b=>`<li>${b.t}</li>`).join("")}</ul></div>`;}).join("");
  const proj=R.projects.filter(p=>vis(p.tags)).map(p=>`<div class="aproj"><b>${esc(p.title)}</b> — ${esc(p.desc)}</div>`).join("");
  const extras=(FILTER==='all')?extraRepos().map(r=>esc(r.name)).slice(0,10).join(", "):"";
  const extraLine=extras?`<div class="aproj" style="margin-top:4px"><b>Additional open source</b> (${esc(R.links.github)}): ${extras}</div>`:"";
  const skills=R.skills.filter(s=>vis(s.tags)).map(s=>`<div class="askill"><b>${esc(s.label||s.k)}:</b> ${esc(s.v)}</div>`).join("");
  return `<div class="a" id="ats-doc">
    <div class="aname">${esc(R.name)}</div><div class="arole">${esc(R.tagline)}</div>
    <div class="acontact">${contact}</div>
    <h2>Summary</h2><div class="asum">${esc(summaryFor())}</div>
    <h2>Experience</h2>${exp}
    ${(proj||extraLine)?'<h2>Projects</h2>'+proj+extraLine:''}
    <h2>Skills</h2>${skills}
    <h2>Education</h2><div class="aedu"><b>${esc(R.education[0].l)}</b> — ${esc(R.education[0].s)}</div>
    <h2>Certifications</h2><div class="aedu">${esc(R.certs[0].l)} — ${esc(R.certs[0].s)}</div></div>`;
}

//=================== CONTROL ===================
const MODES=['portfolio','ats'], FILTERS=['all','lead','ai','crypto','security','infra','fullstack'];
function render(){ MODE==='ats'?document.getElementById('stage').innerHTML=atsHTML():renderPortfolio(); }
function syncButtons(){
  document.querySelectorAll('.modebtn').forEach(b=>b.classList.toggle('on',b.dataset.m===MODE));
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.f===FILTER));
}
function persist(){
  try{ localStorage.setItem('nw-view',MODE); localStorage.setItem('nw-filter',FILTER); }catch(e){}
  const h=MODE+'/'+FILTER; if(location.hash.replace(/^#/,'')!==h){ history.replaceState(null,'','#'+h); }
}
function apply(){ document.body.className='mode-'+MODE; syncButtons(); persist(); render(); }
function setMode(m){ if(MODES.includes(m)){ MODE=m; apply(); } }
function setFilter(f){ if(FILTERS.includes(f)){ FILTER=f; apply(); } }
function initState(){
  let m,f; const h=location.hash.replace(/^#/,'').split('/');
  if(h[0])m=h[0]; if(h[1])f=h[1];
  try{ m=m||localStorage.getItem('nw-view'); f=f||localStorage.getItem('nw-filter'); }catch(e){}
  MODE=MODES.includes(m)?m:'portfolio';
  FILTER=FILTERS.includes(f)?f:'all';
  document.body.className='mode-'+MODE; syncButtons();
}
window.addEventListener('hashchange',()=>{ initState(); render(); });
async function loadRepos(){
  REPONOTE="loading…";
  try{ const res=await fetch("https://api.github.com/users/ncwardell/repos?per_page=100&sort=updated",{headers:{Accept:"application/vnd.github+json"}});
    if(!res.ok)throw new Error("HTTP "+res.status); const data=await res.json(); if(!Array.isArray(data))throw new Error("bad");
    REPOS=data; REPONOTE="● live · "+data.filter(r=>!r.fork).length+" public repos";
  }catch(e){ REPOS=[]; REPONOTE="● github offline"; }
  render();
}
initState(); persist(); render(); loadRepos();
